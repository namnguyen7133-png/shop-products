<script>
    const FOLDERS = ["data/csv_shopee/", "data/csv_scraper/"];
    let allProducts = [];

    async function fetchData() {
        allProducts = []; 
        const grid = document.getElementById('productGrid');
        
        for (const folder of FOLDERS) {
            for (let i = 1; i <= 50; i++) {
                const fileName = `shop_data_${i}.csv`; 
                try {
                    const response = await fetch(folder + fileName + '?v=' + Date.now());
                    if (!response.ok) continue; 

                    const text = await response.text();
                    if (!text || text.trim() === "") continue;

                    // Tách dòng an toàn
                    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                    
                    for (let j = 1; j < rows.length; j++) {
                        try {
                            // Xử lý tách cột cực kỳ cẩn thận
                            const cols = rows[j].split(',').map(c => c.replace(/^"|"$/g, '').trim());
                            
                            if (cols.length >= 4 && cols[3] !== "") {
                                allProducts.push({
                                    shop:  cols[0] || "Shopee",
                                    name:  cols[1] || "Sản phẩm",
                                    price: cols[2] || "Săn deal ngay",
                                    image: cols[3], // Link ảnh ở cột D
                                    link:  cols[4] || "#"
                                });
                            }
                        } catch (lineError) {
                            console.warn("Bỏ qua 1 dòng lỗi tại file: " + fileName);
                        }
                    }
                } catch (err) {
                    console.error("Không thể đọc file: " + fileName);
                }
            }
        }
        displayProducts(allProducts);
    }

    function displayProducts(products) {
        const grid = document.getElementById('productGrid');
        if (!products || products.length === 0) {
            grid.innerHTML = "<div class='loading'>⚠️ Hệ thống đang chờ dữ liệu mới từ Sheet. <br> Hãy đảm bảo cột D đã có link ảnh và file CSV đã được đẩy lên GitHub.</div>";
            return;
        }

        grid.innerHTML = products.map(p => {
            // Sửa link ảnh Shopee tự động
            let cleanImg = p.image;
            if (cleanImg && !cleanImg.startsWith('http')) {
                cleanImg = "https://down-bs-vn.img.susercontent.com/vn-" + cleanImg;
            }

            return `
                <div class="card">
                    <div class="img-box">
                        <img src="${cleanImg}" loading="lazy" onerror="this.src='https://via.placeholder.com/400?text=Lỗi+Ảnh'">
                    </div>
                    <div class="info">
                        <div class="shop-name">🏪 ${p.shop}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="price">${p.price}</div>
                        <a href="${p.link}" target="_blank" class="btn-buy">SĂN DEAL NGAY</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.onload = fetchData;
</script>
