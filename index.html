<script>
    const FOLDERS = ["data/csv_shopee/", "data/csv_scraper/"];
    let allProducts = [];

    async function fetchData() {
        allProducts = []; 
        const grid = document.getElementById('productGrid');
        
        for (const folder of FOLDERS) {
            for (let i = 1; i <= 50; i++) {
                const fileName = `shop_data_${i}.csv`; 
                try {
                    const response = await fetch(folder + fileName + '?v=' + Math.random());
                    if (!response.ok) continue; 

                    const text = await response.text();
                    if (!text || text.trim() === "") continue;

                    const rows = text.split(/\r?\n/);
                    const productsFromFile = rows.slice(1) // Bỏ tiêu đề
                        .map(row => {
                            // Xử lý tách cột an toàn hơn
                            const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                            if (cols.length < 4) return null; // Bỏ qua dòng thiếu dữ liệu

                            return {
                                shop:  cols[0] || "Shopee",
                                name:  cols[1] || "Sản phẩm",
                                price: cols[2] || "Săn ngay",
                                image: cols[3] || "", // Cột D
                                link:  cols[4] || "#"
                            };
                        })
                        .filter(p => p !== null && p.image !== "");

                    allProducts = allProducts.concat(productsFromFile);
                } catch (err) {
                    console.error("Lỗi đọc file: " + fileName, err);
                    continue; // Lỗi file này thì chạy file kế tiếp, không dừng lại
                }
            }
        }
        displayProducts(allProducts);
    }

    function displayProducts(products) {
        const grid = document.getElementById('productGrid');
        if (!products || products.length === 0) {
            grid.innerHTML = "<div class='loading'>⚠️ Không tìm thấy dữ liệu ảnh ở cột D. Vui lòng kiểm tra lại tệp CSV.</div>";
            return;
        }

        grid.innerHTML = products.map(p => {
            // Tự động sửa link ảnh Shopee nếu chỉ có mã ID
            let cleanImg = p.image;
            if (cleanImg && !cleanImg.startsWith('http')) {
                cleanImg = "https://down-bs-vn.img.susercontent.com/vn-" + cleanImg;
            }

            return `
                <div class="card">
                    <div class="img-box">
                        <img src="${cleanImg}" loading="lazy" onerror="this.src='https://via.placeholder.com/400?text=Lỗi+Ảnh'">
                    </div>
                    <div class="info">
                        <div class="shop-name">🏪 ${p.shop}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="price">${p.price}</div>
                        <a href="${p.link}" target="_blank" class="btn-buy">SĂN DEAL NGAY</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p => 
            (p.name && p.name.toLowerCase().includes(term)) || 
            (p.shop && p.shop.toLowerCase().includes(term))
        );
        displayProducts(filtered);
    });

    window.onload = fetchData;
</script>
