<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS6o3x_ZHmwp0UFTMCXkUuFMWpXuLaKjO29mVSSho1bOUo9Nk_ICRUCwF-aLD9IO5PLHTO2AUiw555j/pub?gid=0&single=true&output=tsv";

let allProducts = [];

async function fetchData(){

try{

const response = await fetch(SHEET_URL + "&t=" + Date.now(),{
method:"GET",
cache:"no-store"
});

const text = await response.text();

const rows = text.split(/\r?\n/).filter(r=>r.trim()!=="");

allProducts = rows.slice(1).map(row=>{

const cols = row.split("\t");

return{
shop: cols[0] || "Shopee",
name: cols[1] || "Sản phẩm",
price: cols[2] || "",
image: cols[3] || "",
link: cols[4] || "#"
};

}).filter(p=>p.image !== "");

displayProducts(allProducts);

}catch(err){

console.error(err);

document.getElementById("productGrid").innerHTML =
"<div style='padding:20px'>❌ Không tải được dữ liệu</div>";

}

}

function displayProducts(products){

const grid = document.getElementById("productGrid");

if(!grid) return;

if(products.length===0){

grid.innerHTML="<div style='padding:20px'>⚠️ Chưa có sản phẩm</div>";
return;

}

grid.innerHTML = products.map(p=>{

let cleanImg = p.image;

if(cleanImg && !cleanImg.startsWith("http")){
cleanImg = "https://cf.shopee.vn/file/" + cleanImg;
}

return `

<div class="card">

<div class="img-box">
<img src="${cleanImg}" loading="lazy"
onerror="this.src='https://via.placeholder.com/400?text=Shopee'">
</div>

<div class="info">

<div class="shop-name">🏪 ${escapeHTML(p.shop)}</div>

<div class="product-name">${escapeHTML(p.name)}</div>

<div class="price">${escapeHTML(p.price)}</div>

<a href="${p.link}" target="_blank"
rel="nofollow sponsored"
class="btn-buy">SĂN DEAL NGAY</a>

</div>

</div>

`;

}).join("");

}

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,m=>({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#039;"
})[m]);

}

const search = document.getElementById("searchInput");

if(search){

search.addEventListener("input",e=>{

const term = e.target.value.toLowerCase();

const filtered = allProducts.filter(p=>
p.name.toLowerCase().includes(term) ||
p.shop.toLowerCase().includes(term)
);

displayProducts(filtered);

});

}

window.onload = fetchData;

</script>
