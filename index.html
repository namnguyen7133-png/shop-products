<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Săn Sale</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #ee4d2d; text-transform: uppercase; }

        /* Lưới sản phẩm */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Khung thẻ sản phẩm */
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        /* Chống giật: Cố định chiều cao khung ảnh */
        .img-container {
            width: 100%;
            height: 180px;
            background: #eee; /* Màu nền khi chưa có ảnh */
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .card h3 {
            font-size: 14px;
            margin: 0 0 8px 0;
            height: 36px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #333;
        }

        .price { color: #ee4d2d; font-weight: bold; font-size: 16px; margin-bottom: 10px; }

        .btn-buy {
            background: #ee4d2d;
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>🔥 DANH SÁCH SẢN PHẨM 🔥</h2>
    <div class="grid" id="products"></div>

    <script>
        const TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS6o3x_ZHmwp0UFTMCXkUuFMWpXuLaKjO29mVSSho1b0Uo9Nk_ICRUCwF-aLD9IO5PLHTO2AUiw555j/pub?gid=0&single=true&output=tsv";

        async function loadData() {
            try {
                const res = await fetch(TSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1); // Bỏ dòng đầu
                let html = "";

                rows.forEach(row => {
                    const cols = row.split('\t');
                    if (cols.length < 2) return;

                    // --- CHỈNH THỨ TỰ CỘT Ở ĐÂY ---
                    const name  = cols[0]?.trim(); // Cột A
                    const price = cols[1]?.trim(); // Cột B
                    const image = cols[2]?.trim(); // Cột C
                    const link  = cols[3]?.trim(); // Cột D
                    // -----------------------------

                    if (name && link) {
                        html += `
                        <div class="card">
                            <div class="img-container">
                                <img src="${image || 'https://via.placeholder.com/200'}" 
                                     onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                            </div>
                            <div class="info">
                                <h3>${name}</h3>
                                <div class="price">${price || 'Liên hệ'}</div>
                                <a href="${link}" target="_blank" class="btn-buy">SĂN DEAL NGAY</a>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById("products").innerHTML = html;
            } catch (e) {
                document.getElementById("products").innerHTML = "Lỗi tải dữ liệu.";
            }
        }
        loadData();
    </script>
</body>
</html>
