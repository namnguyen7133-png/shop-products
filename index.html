<script>
    const FOLDERS = ["data/csv_shopee/", "data/csv_scraper/"];
    let allProducts = [];

    async function fetchData() {
        allProducts = []; 
        
        for (const folder of FOLDERS) {
            for (let i = 1; i <= 50; i++) {
                const fileName = `shop_data_${i}.csv`; 
                try {
                    const response = await fetch(folder + fileName + '?t=' + new Date().getTime()); // Thêm chống cache
                    if (!response.ok) break; 

                    const data = await response.text();
                    const rows = data.split('\n').filter(row => row.trim() !== ""); // Xóa dòng trống
                    
                    const productsFromFile = rows.slice(1).map(row => {
                        // Xử lý phân tách cột (ưu tiên dấu phẩy vì là CSV)
                        const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim()); 
                        
                        return {
                            shop:  cols[0] || "Cửa hàng",
                            name:  cols[1] || "Sản phẩm đang cập nhật",
                            price: cols[2] || "Xem giá tại sàn",
                            image: cols[3] || "", // Cột D là ảnh
                            link:  cols[4] || "#"
                        };
                    }).filter(p => p.image !== ""); // Chỉ lấy những dòng có ảnh

                    allProducts = allProducts.concat(productsFromFile);
                } catch (err) {
                    break; 
                }
            }
        }
        displayProducts(allProducts);
    }

    function displayProducts(products) {
        const grid = document.getElementById('productGrid');
        if (products.length === 0) {
            grid.innerHTML = "<div class='loading'>Đang đồng bộ dữ liệu ảnh từ cột D...</div>";
            return;
        }
        grid.innerHTML = products.map(p => {
            // Chuẩn hóa link ảnh Shopee nếu bị lỗi định dạng
            let cleanImg = p.image;
            if (cleanImg.includes('http') === false && cleanImg !== "") {
                cleanImg = "https://down-bs-vn.img.susercontent.com/vn-" + cleanImg;
            }

            return `
                <div class="card">
                    <div class="img-box">
                        <img src="${cleanImg}" onerror="this.src='https://via.placeholder.com/400?text=Hình+Sản+Phẩm'">
                    </div>
                    <div class="info">
                        <div class="shop-name">🏪 ${p.shop}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="price">${p.price}</div>
                        <a href="${p.link}" target="_blank" class="btn-buy">SĂN DEAL NGAY</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p => 
            (p.name && p.name.toLowerCase().includes(term)) || 
            (p.shop && p.shop.toLowerCase().includes(term))
        );
        displayProducts(filtered);
    });

    window.onload = fetchData;
</script>
