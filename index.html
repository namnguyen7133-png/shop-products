<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Shop Products</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

.price{
color:red;
font-weight:bold;
margin-top:5px;
}

button{
background:#ff4d4f;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>Danh sách sản phẩm</h2>

<div class="grid" id="products"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxbZLOr0haBfkdNOSwFlXIgrxuWm4I6NaZrh8kNAqFoosOqtUKg0q3zsPuwwvFsbywHvw/exec";

fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(p=>{

html+=`
<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="price">${p.price}</div>

<a href="${p.link}" target="_blank">
<button>Mua ngay</button>
</a>

</div>
`;

});

document.getElementById("products").innerHTML=html;

});

</script>

</body>
</html>
