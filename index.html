<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Săn Sale</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #ee4d2d; /* Màu cam Shopee */
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
        }

        .card h3 {
            font-size: 14px;
            color: #333;
            margin: 10px 0;
            height: 40px; /* Giới hạn 2 dòng tên */
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price {
            color: #ee4d2d;
            font-weight: bold;
            font-size: 18px;
            margin: 5px 0 15px 0;
        }

        .btn-buy {
            background: linear-gradient(90deg, #ff4d4f, #ff7875);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: block;
            transition: opacity 0.2s;
        }

        .btn-buy:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h2>🔥 Danh Sách Sản Phẩm Hot 🔥</h2>

    <div class="grid" id="products">
        </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzj1qkd3XA3xXyFYxSvc43VlwXSbUu58D5CwmU7V78fjDYUxFH1Ha64n5EmeNZJlc1O9A/exec";

        fetch(API)
            .then(res => res.json())
            .then(data => {
                let html = "";
                
                data.forEach(p => {
                    // Kiểm tra nếu hàng có tên và link thì mới hiển thị (tránh hàng trống)
                    if (p.name && p.link && p.name.trim() !== "") {
                        // Xử lý ảnh mặc định nếu link ảnh bị lỗi
                        const imgUrl = p.image || 'https://via.placeholder.com/200x200?text=No+Image';
                        
                        html += `
                        <div class="card">
                            <div>
                                <img src="${imgUrl}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Sản+Phẩm'">
                                <h3>${p.name}</h3>
                                <div class="price">${p.price}</div>
                            </div>
                            <a href="${p.link}" target="_blank" class="btn-buy">SĂN DEAL NGAY</a>
                        </div>
                        `;
                    }
                });

                document.getElementById("products").innerHTML = html;
            })
            .catch(err => {
                console.error("Lỗi tải dữ liệu:", err);
                document.getElementById("products").innerHTML = "<p>Đang tải dữ liệu hoặc có lỗi xảy ra...</p>";
            });
    </script>
</body>
</html>
