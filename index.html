<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Săn Sale</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #ee4d2d; 
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain; /* Giúp ảnh không bị méo */
            border-radius: 8px;
            background: #fff;
        }

        .card h3 {
            font-size: 14px;
            color: #333;
            margin: 10px 0;
            height: 40px; 
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price {
            color: #ee4d2d;
            font-weight: bold;
            font-size: 18px;
            margin: 5px 0 15px 0;
        }

        .btn-buy {
            background: linear-gradient(90deg, #ff4d4f, #ff7875);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: block;
            transition: opacity 0.2s;
        }

        .btn-buy:hover {
            opacity: 0.9;
        }
        
        .loading { text-align: center; grid-column: 1/-1; padding: 50px; }
    </style>
</head>
<body>

    <h2>🔥 Danh Sách Sản Phẩm Hot 🔥</h2>

    <div class="grid" id="products">
        <div class="loading">Đang tải dữ liệu từ hệ thống...</div>
    </div>

    <script>
        // Link TSV công khai từ Google Sheets của bạn
        const TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS6o3x_ZHmwp0UFTMCXkUuFMWpXuLaKjO29mVSSho1b0Uo9Nk_ICRUCwF-aLD9IO5PLHTO2AUiw555j/pub?gid=0&single=true&output=tsv";

        async function loadData() {
            try {
                const response = await fetch(TSV_URL);
                const text = await response.text();
                
                // Chia dữ liệu thành các dòng
                const rows = text.split('\n');
                let html = "";

                // Bắt đầu từ dòng 1 (bỏ qua tiêu đề)
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split('\t'); // Tách cột bằng phím Tab
                    
                    if (cols.length < 2) continue; // Bỏ qua dòng trống

                    // Map dữ liệu theo thứ tự cột trong Sheet của bạn
                    const p = {
                        name: cols[0] ? cols[0].trim() : "Sản phẩm",
                        price: cols[1] ? cols[1].trim() : "Liên hệ",
                        image: cols[2] ? cols[2].trim() : "",
                        link: cols[3] ? cols[3].trim() : "#"
                    };

                    if (p.name && p.link !== "#") {
                        const imgUrl = p.image || 'https://via.placeholder.com/200x200?text=No+Image';
                        
                        html += `
                        <div class="card">
                            <div>
                                <img src="${imgUrl}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Sản+Phẩm'">
                                <h3>${p.name}</h3>
                                <div class="price">${p.price}</div>
                            </div>
                            <a href="${p.link}" target="_blank" class="btn-buy">SĂN DEAL NGAY</a>
                        </div>
                        `;
                    }
                }

                document.getElementById("products").innerHTML = html || "<p>Chưa có sản phẩm nào được hiển thị.</p>";

            } catch (error) {
                console.error("Lỗi:", error);
                document.getElementById("products").innerHTML = "<p>Lỗi kết nối dữ liệu. Vui lòng kiểm tra lại link Sheet.</p>";
            }
        }

        // Chạy hàm khi trang web tải xong
        window.onload = loadData;
    </script>
</body>
</html>
