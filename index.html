<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shop sản phẩm</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

#searchInput{
width:100%;
padding:10px;
margin-bottom:20px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.card{
background:#fff;
border-radius:8px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:6px;
}

.product-name{
font-size:14px;
margin:8px 0;
}

.price{
color:red;
font-weight:bold;
}

.btn{
display:block;
text-align:center;
background:#ee4d2d;
color:#fff;
padding:8px;
border-radius:5px;
text-decoration:none;
margin-top:8px;
}

</style>

</head>

<body>

<h1>Sản phẩm Shopee</h1>

<input id="searchInput" placeholder="Tìm sản phẩm...">

<div id="productGrid" class="grid"></div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS6o3x_ZHmwp0UFTMCXkUuFMWpXuLaKjO29mVSSho1bOUo9Nk_ICRUCwF-aLD9IO5PLHTO2AUiw555j/pub?gid=0&single=true&output=tsv";

let allProducts=[];

async function fetchData(){

const res=await fetch(SHEET_URL+"&t="+Date.now());
const text=await res.text();

const rows=text.split("\n").slice(1);

allProducts=rows.map(r=>{

const c=r.split("\t");

return{
shop:c[0],
name:c[1],
price:c[2],
image:c[3],
link:c[4]
};

}).filter(p=>p.image);

displayProducts(allProducts);

}

function displayProducts(products){

const grid=document.getElementById("productGrid");

grid.innerHTML=products.map(p=>`

<div class="card">

<img src="${p.image}" onerror="this.src='https://via.placeholder.com/300'">

<div class="product-name">${p.name}</div>

<div class="price">${p.price}</div>

<a href="${p.link}" target="_blank" class="btn">Mua ngay</a>

</div>

`).join("");

}

document.getElementById("searchInput").addEventListener("input",e=>{

const term=e.target.value.toLowerCase();

const filtered=allProducts.filter(p=>
p.name.toLowerCase().includes(term)
);

displayProducts(filtered);

});

fetchData();

</script>

</body>
</html>
